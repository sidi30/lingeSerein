<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
    </style>
  </defs>
  <!-- Lavender sprigs -->
  <g transform="translate(70, 60)">
    <!-- Stem 1 (left) -->
    <line x1="25" y1="180" x2="55" y2="30" stroke="#7B6FA6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Buds on stem 1 -->
    <ellipse cx="50" cy="45" rx="4" ry="7" fill="#8B7CB8" transform="rotate(-15, 50, 45)"/>
    <ellipse cx="52" cy="60" rx="3.5" ry="6" fill="#8B7CB8" transform="rotate(-10, 52, 60)"/>
    <ellipse cx="53" cy="75" rx="3.5" ry="6" fill="#8B7CB8" transform="rotate(-8, 53, 75)"/>
    <ellipse cx="48" cy="55" rx="3.5" ry="6" fill="#9B8DC8" transform="rotate(15, 48, 55)"/>
    <ellipse cx="47" cy="70" rx="3" ry="5.5" fill="#9B8DC8" transform="rotate(12, 47, 70)"/>
    <ellipse cx="55" cy="35" rx="3" ry="5" fill="#7B6FA6" transform="rotate(-20, 55, 35)"/>
    <ellipse cx="46" cy="40" rx="3" ry="5" fill="#7B6FA6" transform="rotate(20, 46, 40)"/>
    
    <!-- Stem 2 (middle) -->
    <line x1="40" y1="185" x2="65" y2="20" stroke="#7B6FA6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Buds on stem 2 -->
    <ellipse cx="62" cy="35" rx="4" ry="7" fill="#8B7CB8" transform="rotate(-12, 62, 35)"/>
    <ellipse cx="63" cy="50" rx="3.5" ry="6" fill="#8B7CB8" transform="rotate(-8, 63, 50)"/>
    <ellipse cx="64" cy="65" rx="3.5" ry="6" fill="#9B8DC8" transform="rotate(-5, 64, 65)"/>
    <ellipse cx="59" cy="42" rx="3.5" ry="6" fill="#9B8DC8" transform="rotate(15, 59, 42)"/>
    <ellipse cx="58" cy="57" rx="3" ry="5.5" fill="#8B7CB8" transform="rotate(12, 58, 57)"/>
    <ellipse cx="66" cy="25" rx="3" ry="5" fill="#7B6FA6" transform="rotate(-18, 66, 25)"/>
    
    <!-- Stem 3 (right, shorter) -->
    <line x1="15" y1="178" x2="42" y2="50" stroke="#7B6FA6" stroke-width="2" stroke-linecap="round"/>
    <!-- Buds on stem 3 -->
    <ellipse cx="40" cy="62" rx="3.5" ry="6" fill="#8B7CB8" transform="rotate(-12, 40, 62)"/>
    <ellipse cx="41" cy="77" rx="3" ry="5.5" fill="#9B8DC8" transform="rotate(-8, 41, 77)"/>
    <ellipse cx="37" cy="70" rx="3" ry="5" fill="#8B7CB8" transform="rotate(15, 37, 70)"/>
    <ellipse cx="42" cy="55" rx="3" ry="5" fill="#7B6FA6" transform="rotate(-15, 42, 55)"/>
  </g>
  
  <!-- Text: Linge -->
  <text x="175" y="130" font-family="'Playfair Display', 'Georgia', serif" font-size="90" font-weight="700" fill="#1B5E20" letter-spacing="2">Linge</text>
  
  <!-- Text: Serein -->
  <text x="175" y="235" font-family="'Playfair Display', 'Georgia', serif" font-size="90" font-weight="700" fill="#1B5E20" letter-spacing="2">Serein</text>
</svg>