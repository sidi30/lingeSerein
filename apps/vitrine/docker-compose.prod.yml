services:
  vitrine:
    image: nginx:alpine
    container_name: lingeserein-vitrine
    restart: unless-stopped
    volumes:
      - /var/www/lingeserein.fr:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTPS router
      - "traefik.http.routers.vitrine-secure.rule=Host(`lingeserein.fr`) || Host(`www.lingeserein.fr`)"
      - "traefik.http.routers.vitrine-secure.entrypoints=https"
      - "traefik.http.routers.vitrine-secure.tls=true"
      - "traefik.http.routers.vitrine-secure.tls.certresolver=letsencrypt-dns"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.vitrine.rule=Host(`lingeserein.fr`) || Host(`www.lingeserein.fr`)"
      - "traefik.http.routers.vitrine.entrypoints=http"
      - "traefik.http.routers.vitrine.middlewares=vitrine-redirect"
      - "traefik.http.middlewares.vitrine-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.vitrine-redirect.redirectscheme.permanent=true"
      # Service
      - "traefik.http.services.vitrine.loadbalancer.server.port=80"
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
