name: Deploy Vitrine

on:
  push:
    branches: [main]
    paths:
      - "apps/vitrine/**"
      - "package-lock.json"
      - ".github/workflows/deploy-vitrine.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # La vitrine importe @lingengo/shared (résolu sur son dist compilé)
      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Build vitrine
        run: npm run build --workspace=apps/vitrine

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          SOURCE: apps/vitrine/out/
          TARGET: /var/www/lingeserein.fr/
          # -rltvz : pas de préservation owner/group (-o/-g) → évite les échecs chgrp.
          # --delete : miroir exact. DEPLOY_USER=root → peut écraser tous les fichiers.
          ARGS: -rltvz --delete
          SCRIPT_BEFORE: |
            mkdir -p /var/www/lingeserein.fr
